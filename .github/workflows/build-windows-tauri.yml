name: Build Windows EXE

on:
  push:
    paths:
      - 'windows-tool/**'
      - 'shukei-tool.html'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            windows-tool/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('windows-tool/src-tauri/Cargo.toml') }}

      - name: Install npm dependencies
        working-directory: ./windows-tool
        run: npm install

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./windows-tool

      # ダブルクリックでそのまま起動できる「ポータブル版」
      # （インストール不要。事務所PCにコピーするだけ）
      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: tanaoroshi-shukei-portable
          path: windows-tool/src-tauri/target/release/*.exe
          retention-days: 30

      # NSISインストーラー版（インストールして使う場合）
      - name: Upload installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: tanaoroshi-shukei-installer
          path: windows-tool/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
